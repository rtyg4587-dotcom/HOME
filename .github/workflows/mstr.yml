name: Update MSTR price

on:
  schedule:
    - cron: '0 14 * * 1-5'
    - cron: '0 22 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: mstr-price
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch MSTR price
        run: |
          set -e
          UA="Mozilla/5.0 (compatible; mstr-price-bot/1.0)"
          PRICE=""; SRC=""
          Y=$(curl -sf -H "User-Agent: $UA" "https://query1.finance.yahoo.com/v8/finance/chart/MSTR?interval=1d&range=1d" || true)
          if [ -n "$Y" ]; then
            P=$(echo "$Y" | jq -r '.chart.result[0].meta.regularMarketPrice // empty' 2>/dev/null || true)
            if [ -n "$P" ] && [ "$P" != "null" ]; then PRICE="$P"; SRC="Yahoo"; fi
          fi
          if [ -z "$PRICE" ]; then
            C=$(curl -sf -H "User-Agent: $UA" "https://stooq.com/q/l/?s=mstr.us&f=sd2t2ohlcv&h&e=csv" || true)
            P=$(echo "$C" | tail -1 | cut -d',' -f7)
            if echo "$P" | grep -Eq '^[0-9]+(\.[0-9]+)?$'; then PRICE="$P"; SRC="Stooq"; fi
          fi
          if [ -z "$PRICE" ]; then echo "::warning::수신 실패"; exit 0; fi
          NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          printf '{"price": %s, "src": "%s", "asof": "%s"}\n' "$PRICE" "$SRC" "$NOW" > mstr.json
          cat mstr.json
      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add mstr.json
          if git diff --cached --quiet; then
            echo "변경 없음"
          else
            git commit -m "chore: update MSTR price [skip ci]"
            git push
          fi
