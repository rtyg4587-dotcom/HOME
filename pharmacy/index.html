<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>K-Pharmacy Guide</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{
    --paper:#FAFAF7; --surface:#FFFFFF; --ink:#1A1F1C; --ink-soft:#5C635E;
    --line:#E8E9E3; --line-2:#D8DAD2;
    --pharm:#1F7A5A; --pharm-deep:#155C43; --pharm-soft:#EAF4EF;
    --otc-bg:#FBF1E3; --otc-tx:#9C6418;
    --cos-bg:#EAF4EF; --cos-tx:#155C43;
    --quasi-bg:#EDF1F3; --quasi-tx:#465B66;
    --danger:#B23A3A; --radius:14px; --radius-sm:10px; --maxw:430px; --nav-h:64px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{background:#EFEFEA;color:var(--ink);font-family:"Inter",-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR","Noto Sans JP","Noto Sans SC",sans-serif;line-height:1.55;-webkit-font-smoothing:antialiased;}
  .phone{max-width:var(--maxw);margin:0 auto;min-height:100vh;background:var(--paper);display:flex;flex-direction:column;box-shadow:0 0 40px rgba(0,0,0,.06);}
  .bar{position:sticky;top:0;z-index:20;background:rgba(250,250,247,.92);backdrop-filter:saturate(1.4) blur(8px);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:8px;padding:14px 16px;}
  .bar .back{border:0;background:none;color:var(--ink);font-size:22px;cursor:pointer;width:26px;visibility:hidden;line-height:1;}
  .bar .back.show{visibility:visible;}
  .brand{display:flex;align-items:center;gap:7px;font-weight:600;font-size:15px;flex:1;}
  .cross{width:18px;height:18px;position:relative;flex-shrink:0;}
  .cross::before,.cross::after{content:"";position:absolute;background:var(--pharm);border-radius:1.5px;}
  .cross::before{width:6px;height:18px;left:6px;}
  .cross::after{height:6px;width:18px;top:6px;}
  .lang{position:relative;}
  .lang button{border:1px solid var(--line-2);background:var(--surface);border-radius:999px;padding:6px 11px;font-size:12px;color:var(--ink-soft);cursor:pointer;font-family:inherit;}
  .lang-menu{position:absolute;right:0;top:38px;background:var(--surface);border:1px solid var(--line-2);border-radius:12px;padding:6px;min-width:152px;box-shadow:0 8px 24px rgba(0,0,0,.1);display:none;z-index:40;}
  .lang-menu.open{display:block;}
  .lang-menu button{display:block;width:100%;text-align:left;border:0;background:none;padding:8px 10px;border-radius:8px;font-size:13px;color:var(--ink);cursor:pointer;font-family:inherit;}
  .lang-menu button:hover{background:var(--pharm-soft);}
  .lang-menu button[aria-current="true"]{color:var(--pharm);font-weight:600;}

  main{flex:1;padding:18px 16px calc(var(--nav-h) + 90px);}
  h1{font-size:21px;font-weight:600;margin:0 0 4px;letter-spacing:-.01em;}
  .lede{color:var(--ink-soft);font-size:13px;margin:0 0 20px;}
  .eyebrow{font-size:12px;color:var(--ink-soft);margin:0 0 8px;font-weight:500;}
  .head-row{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;}
  .linkbtn{border:0;background:none;color:var(--pharm);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;padding:0;white-space:nowrap;}

  .chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px;}
  .chip{border:1px solid var(--line-2);background:var(--surface);border-radius:999px;padding:8px 14px;font-size:13px;color:var(--ink);cursor:pointer;font-family:inherit;transition:.12s;}
  .chip[aria-pressed="true"]{background:var(--pharm);border-color:var(--pharm);color:#fff;}

  .btn{width:100%;border:0;background:var(--pharm);color:#fff;border-radius:var(--radius);padding:15px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;transition:.12s;}
  .btn:hover{background:var(--pharm-deep);}
  .btn.ghost{background:var(--surface);color:var(--ink);border:1px solid var(--line-2);}
  .btn.ghost:hover{border-color:var(--ink-soft);}

  .search{display:flex;align-items:center;gap:9px;border:1px solid var(--line-2);background:var(--surface);border-radius:var(--radius);padding:12px 14px;margin-bottom:14px;}
  .search input{border:0;outline:0;flex:1;font-size:14px;font-family:inherit;color:var(--ink);background:none;}
  .search svg{color:var(--ink-soft);flex-shrink:0;}
  .sortrow{display:flex;align-items:center;gap:8px;margin-bottom:16px;}
  .sortrow label{font-size:12px;color:var(--ink-soft);}
  select{font-family:inherit;font-size:13px;color:var(--ink);background:var(--surface);border:1px solid var(--line-2);border-radius:999px;padding:7px 12px;cursor:pointer;}
  .s{font-size:11px;color:var(--ink-soft);}

  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:14px;margin-bottom:11px;transition:.12s;}
  .card:hover{border-color:var(--line-2);}
  .card-row{display:flex;align-items:center;gap:12px;cursor:pointer;}
  .rank{font-size:15px;font-weight:600;color:var(--ink-soft);width:16px;text-align:center;flex-shrink:0;}
  .card-body{flex:1;min-width:0;}
  .pname{font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .prom{color:var(--ink-soft);font-size:12px;font-weight:400;}
  .pmeta{font-size:12px;color:var(--ink-soft);margin-top:2px;}
  .badge{font-size:11px;font-weight:500;padding:3px 9px;border-radius:999px;white-space:nowrap;}
  .b-OTC{background:var(--otc-bg);color:var(--otc-tx);}
  .b-COSMETIC{background:var(--cos-bg);color:var(--cos-tx);}
  .b-QUASI{background:var(--quasi-bg);color:var(--quasi-tx);}
  .match{color:var(--pharm);font-weight:500;}
  .selbox{flex-shrink:0;width:26px;height:26px;border-radius:8px;border:1px solid var(--line-2);background:var(--surface);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--ink-soft);font-size:15px;}
  .selbox[aria-pressed="true"]{background:var(--pharm);border-color:var(--pharm);color:#fff;}

  .detail-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;}
  .detail-head h1{margin:0;}
  .note{border:1px solid var(--line-2);border-radius:var(--radius-sm);padding:11px 13px;font-size:12px;color:var(--ink-soft);margin:14px 0;line-height:1.5;background:var(--surface);}
  .note.info{border-color:#CFE3D9;background:var(--pharm-soft);color:var(--pharm-deep);}
  table.kv{width:100%;border-collapse:collapse;font-size:13px;margin-top:8px;}
  table.kv td{padding:9px 0;border-bottom:1px solid var(--line);vertical-align:top;}
  table.kv td:first-child{color:var(--ink-soft);width:40%;}
  table.kv td:last-child{text-align:right;}
  .danger{color:var(--danger);}

  .rx{margin-top:18px;border:1.5px dashed var(--pharm);border-radius:var(--radius);background:var(--pharm-soft);padding:18px 16px;text-align:center;}
  .rx .lbl{font-size:11px;color:var(--pharm-deep);margin-bottom:8px;display:flex;align-items:center;justify-content:center;gap:6px;}
  .rx .ko{font-size:26px;font-weight:600;color:var(--ink);}
  .stars{color:#E8A93B;letter-spacing:1px;}
  .ratenum{color:var(--ink-soft);font-size:12px;}
  .raterow{margin:2px 0 12px;font-size:14px;}
  .famgroup{margin-bottom:12px;}
  .fammembers{margin-left:14px;border-left:2px solid var(--line);padding-left:10px;margin-top:6px;display:flex;flex-direction:column;gap:8px;}
  .card.member{background:#FAFAF6;}
  .repbadge{display:inline-block;font-size:10px;font-weight:700;color:var(--pharm-deep);background:var(--pharm-soft);border:1px solid var(--pharm);border-radius:6px;padding:1px 6px;margin-left:6px;vertical-align:middle;letter-spacing:.3px;}
  .famnote{color:var(--ink-soft);font-size:12px;}
  .rgnchip{display:inline-block;font-size:10px;font-weight:600;color:#0F5C8C;background:#E4F1FA;border:1px solid #B9DBF0;border-radius:6px;padding:1px 6px;margin-left:6px;vertical-align:middle;}

  .buy{margin-top:16px;}
  .buy a{display:flex;align-items:center;justify-content:space-between;border:1px solid var(--line-2);background:var(--surface);border-radius:var(--radius-sm);padding:13px 15px;margin-bottom:9px;text-decoration:none;color:var(--ink);font-size:14px;font-weight:500;}
  .buy a:hover{border-color:var(--pharm);}
  .buy a .arrow{color:var(--ink-soft);}
  .disclose{font-size:11px;color:var(--ink-soft);margin-top:2px;}
  .addcmp{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line-2);background:var(--surface);border-radius:999px;padding:8px 14px;font-size:12px;cursor:pointer;color:var(--ink);font-family:inherit;margin-top:14px;}
  .addcmp[aria-pressed="true"]{border-color:var(--pharm);background:var(--pharm-soft);color:var(--pharm-deep);}
  .related{margin-top:20px;padding-top:16px;border-top:1px solid var(--line);}

  .toggle{display:inline-flex;border:1px solid var(--line-2);border-radius:999px;padding:3px;margin-bottom:16px;background:var(--surface);}
  .toggle button{border:0;background:none;padding:7px 16px;font-size:13px;border-radius:999px;cursor:pointer;color:var(--ink-soft);font-family:inherit;}
  .toggle button[aria-pressed="true"]{background:var(--pharm);color:#fff;}
  .cmp-grid{display:grid;gap:10px;}
  .cmp-col{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:13px;}
  .cmp-col.feat{border:1.5px solid var(--pharm);}
  .cmp-col .cn{font-size:14px;font-weight:600;margin:8px 0 10px;}
  .cmp-col dl{margin:0;font-size:12px;}
  .cmp-col dt{color:var(--ink-soft);margin-top:8px;}
  .cmp-col dd{margin:1px 0 0;}
  table.cmp{width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed;}
  table.cmp th,table.cmp td{padding:9px 4px;border-bottom:1px solid var(--line);text-align:center;}
  table.cmp th:first-child,table.cmp td:first-child{text-align:left;color:var(--ink-soft);width:30%;}
  table.cmp th{font-weight:600;}
  .empty{color:var(--ink-soft);font-size:13px;text-align:center;padding:30px 10px;}

  .map{height:200px;border-radius:var(--radius);background:linear-gradient(135deg,#E5EDE8,#EEF1ED);display:flex;align-items:center;justify-content:center;color:var(--ink-soft);font-size:13px;margin-bottom:16px;border:1px solid var(--line);overflow:hidden;}
  .ph{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:13px 14px;margin-bottom:10px;cursor:pointer;transition:.12s;}
  .ph:hover{border-color:var(--pharm);}
  .phfilter{margin-bottom:14px;}
  .phmeta{font-size:12px;color:var(--ink-soft);margin-top:6px;}
  .phmeta a{color:var(--pharm);text-decoration:none;}
  .legend{display:flex;gap:14px;align-items:center;font-size:11px;color:var(--ink-soft);margin:-2px 0 12px;flex-wrap:wrap;}
  .legend i{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:5px;vertical-align:middle;border:1.5px solid #fff;box-shadow:0 0 0 1px rgba(0,0,0,.15);}
  .ph .top{display:flex;justify-content:space-between;align-items:center;gap:8px;}
  .ph .nm{font-weight:600;font-size:15px;}
  .ph .tag{font-size:11px;color:var(--pharm);font-weight:500;white-space:nowrap;}
  .ph .sub{font-size:12px;color:var(--ink-soft);margin-top:4px;display:flex;gap:10px;flex-wrap:wrap;}
  .ph .lines{font-size:11px;color:var(--cos-tx);background:var(--cos-bg);display:inline-block;padding:2px 8px;border-radius:999px;margin-top:8px;}
  .dir{display:flex;align-items:center;gap:6px;margin-top:10px;flex-wrap:wrap;}
  .dir .dirlbl{font-size:11px;color:var(--ink-soft);margin-right:2px;}
  .dir a{font-size:12px;text-decoration:none;color:var(--pharm-deep);background:var(--pharm-soft);border:1px solid #CFE3D9;border-radius:999px;padding:5px 11px;}
  .dir a:hover{background:#DCEFE4;}
  .locbtn{width:auto;display:inline-flex;align-items:center;gap:6px;padding:9px 14px;font-size:13px;margin:-4px 0 14px;}

  .cmpbar{position:fixed;left:0;right:0;bottom:var(--nav-h);max-width:var(--maxw);margin:0 auto;background:var(--surface);border-top:1px solid var(--line-2);padding:11px 16px;display:none;align-items:center;gap:12px;z-index:30;}
  .cmpbar.show{display:flex;}
  .cmpbar .cnt{font-size:13px;color:var(--ink-soft);flex:1;}
  .cmpbar .cnt b{color:var(--ink);}
  .cmpbar button{width:auto;padding:11px 18px;}
  .cmpbar .clear{background:none;border:0;color:var(--ink-soft);font-size:13px;cursor:pointer;font-family:inherit;}
  .tabbar{position:fixed;left:0;right:0;bottom:0;max-width:var(--maxw);margin:0 auto;height:var(--nav-h);background:rgba(255,255,255,.96);backdrop-filter:blur(8px);border-top:1px solid var(--line);display:flex;z-index:35;padding-bottom:env(safe-area-inset-bottom);}
  .tabbar button{flex:1;border:0;background:none;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;font-size:11px;color:var(--ink-soft);cursor:pointer;font-family:inherit;}
  .tabbar button svg{width:22px;height:22px;}
  .tabbar button[aria-current="true"]{color:var(--pharm);font-weight:500;}

  .foot{font-size:11px;color:var(--ink-soft);line-height:1.6;border-top:1px solid var(--line);margin-top:24px;padding-top:16px;}
  @media (prefers-reduced-motion:reduce){*{transition:none!important;}}
  :focus-visible{outline:2px solid var(--pharm);outline-offset:2px;border-radius:6px;}
</style>
</head>
<body>
<div class="phone">
  <div class="bar">
    <button class="back" id="back" aria-label="Back">‹</button>
    <div class="brand"><span class="cross" aria-hidden="true"></span><span id="brandName">K-Pharmacy Guide</span></div>
    <div class="lang"><button id="langBtn" aria-haspopup="true">🌐 <span id="langCode">EN</span> ▾</button><div class="lang-menu" id="langMenu" role="menu"></div></div>
  </div>
  <main id="app"></main>
</div>

<div class="cmpbar" id="cmpbar">
  <div class="cnt"><b id="cmpcnt">0</b> <span id="cmplabel">selected</span></div>
  <button class="clear" id="cmpclear">✕</button>
  <button class="btn" id="cmpgo">Compare</button>
</div>
<nav class="tabbar" id="tabbar" aria-label="Main"></nav>

/* ============================================================
   K-Pharmacy Guide — Phase 0 MVP (single file, no backend)
   ------------------------------------------------------------
   PHARMACY TAB (this build)
   - DATA: if KAKAO_JS_KEY is set, the app auto-loads ALL real nearby
     pharmacies via Kakao category search (PM9) — Korean names + exact
     coords + distance, no backend. Known beauty pharmacies (BEAUTY_NAMES)
     are floated to the top with a ✓ badge. If the key is absent or the
     search fails, it falls back to the curated FALLBACK_PH list.
   - WHY ALL pharmacies: no dataset tags "sells cosmetics," and popular
     items (PDRN creams, Madecassol, acne creams) are stocked at most
     pharmacies, so showing all nearby + badging beauty stores is honest.
   - Geolocation (navigator.geolocation) sorts by distance and works
     independently of the map. If denied, falls back to a Myeongdong center.
   - The embedded map uses NAVER Maps (foreigners' #1 map in Korea).
     Set NAVER_MAP_KEY to your NAVER Cloud Platform Maps Client ID
     (loaded as ncpKeyId) and register your GitHub Pages domain
     (host only, no path/port) under the Maps Application. Without a
     key the list still works; only the visual map is skipped.
   - Directions deep links are COORDINATE + Korean-name based, so they
     work regardless of the user's app language (English search fails
     because Korean place DBs are indexed by Korean names).
   ------------------------------------------------------------
   GEOLOCATION REQUIRES HTTPS. It will NOT work from file:// or in
   a sandboxed preview — deploy to GitHub Pages and open it there.
   ------------------------------------------------------------
   COMPLIANCE: OTC/의약외품 = info only. Cosmetics = affiliate links
   (only when onlineSale!==false) + match score. Review with 약무 변호사.
   ============================================================ */

const badge=c=>`<span class="badge b-${c}">${t("cat_"+c)}</span>`;

const isMed=p=>p.cat==="OTC"||p.cat==="QUASI";
const canBuyOnline=p=>!isMed(p)&&p.onlineSale!==false&&p.affiliates&&p.affiliates.length;
const familyOf=p=>PRODUCTS.filter(q=>q.ingredientKey===p.ingredientKey&&q.id!==p.id);
function altFor(med){
  let a=PRODUCTS.filter(p=>p.cat==="COSMETIC"&&canBuyOnline(p)&&p.ingredientKey===med.ingredientKey&&p.id!==med.id);
  if(!a.length) a=PRODUCTS.filter(p=>p.cat==="COSMETIC"&&canBuyOnline(p)&&p.concerns.some(c=>med.concerns.includes(c)));
  return a.sort((x,y)=>y.views-x.views).slice(0,2);
}

function selectTab(tab){ state.tab=tab; state.screen=tab; state.history=[]; render(); window.scrollTo(0,0); }
function go(screen){ state.history.push(state.screen); state.screen=screen; render(); window.scrollTo(0,0); }
function back(){ const p=state.history.pop(); if(p){ state.screen=p; render(); window.scrollTo(0,0);} }

function productCard(p,opts={}){
  const rank=opts.rank!=null?`<div class="rank">${opts.rank}</div>`:"";
  const matchLine=(p.cat==="COSMETIC"&&opts.match)?`<div class="pmeta match">✦ ${opts.match}%</div>`:"";
  const r=ratingOf(p); const ratLine=r?`<div class="pmeta">${starHtml(r)}</div>`:"";
  const repBadge=opts.famCount>1?`<span class="repbadge">${t("rep_label")}</span>`:"";
  const rgnChip=opts.regionPick?`<span class="rgnchip">🌏 ${t("region_pick")}</span>`:"";
  const famNote=opts.famCount>1?`<div class="pmeta famnote">+${opts.famCount-1} ${t("fam_more")}</div>`:"";
  const memberCls=opts.famMember?" member":"";
  const meta=opts.viewMeta?`${loc(p.indication)} · ${p.views.toLocaleString()} ${t("views")}`:`${loc(p.indication)} · ${price(p.price)}`;
  const sel=opts.selectable?`<button class="selbox" aria-pressed="${state.compare.includes(p.id)}" aria-label="${t("add_compare")}" onclick="event.stopPropagation();toggleCompare('${p.id}')">${state.compare.includes(p.id)?"✓":"+"}</button>`:"";
  return `<div class="card${memberCls}"><div class="card-row" onclick="openDetail('${p.id}')">${rank}
    <div class="card-body"><div class="pname">${p.ko} <span class="prom">${p.rom}</span>${repBadge}${rgnChip}</div>
    <div class="pmeta">${meta}</div>${ratLine}${matchLine}${famNote}</div>${badge(p.cat)}${sel}</div></div>`;
}
/* Group a (filtered, sorted) list by ingredientKey; the rep-flagged item leads
   each group, same-ingredient siblings are nested beneath it. */
function groupFam(list){
  const order=[],map={};
  list.forEach(p=>{ const k=p.ingredientKey; if(!map[k]){map[k]=[];order.push(k);} map[k].push(p); });
  return order.map(k=>{ const g=map[k]; const rep=g.find(x=>x.rep)||g[0]; return {rep,rest:g.filter(x=>x!==rep),count:g.length}; });
}
function famGroupHtml(grp,baseOpts){
  const rep=productCard(grp.rep,{...baseOpts,match:grp.rep._match||null,regionPick:grp.rep._rgn,famCount:grp.count});
  if(grp.count===1) return rep;
  const rest=grp.rest.map(p=>productCard(p,{...baseOpts,match:p._match||null,regionPick:p._rgn,famMember:true})).join("");
  return `<div class="famgroup">${rep}<div class="fammembers">${rest}</div></div>`;
}
function familyBlock(p){
  const fam=familyOf(p); if(!fam.length) return "";
  return `<div class="related"><p class="eyebrow">${t("fam_title")}</p><p class="lede" style="margin-bottom:10px">${t("fam_sub")}</p>${fam.map(q=>productCard(q)).join("")}</div>`;
}
function altBlock(med){
  const a=altFor(med); if(!a.length) return "";
  return `<div class="related"><p class="eyebrow">${t("alt_title")} · ${med.ko}</p><p class="lede" style="margin-bottom:10px">${t("alt_sub")}</p>${a.map(p=>productCard(p)).join("")}</div>`;
}

function chipRow(items,prefix,sel,fn){ return `<div class="chips">`+items.map(k=>`<button class="chip" aria-pressed="${sel===k}" onclick="${fn}('${k}')">${t(prefix+k)}</button>`).join("")+`</div>`; }

      <button class="btn" onclick="finishOnboarding()">${t("start")}</button>`;
  }
  const c=state.profile.concern;
  const reg=state.profile.region||"other";
  const pref=REGION_PREF[reg]||[];
  let list=PRODUCTS.filter(p=>p.concerns.includes(c));
  if(state.profile.preg) list=list.filter(p=>p.pregSafe);
  list.forEach(p=>{ p._match=(p.cat==="COSMETIC")?(80+Math.round((p.views/200)%18)):0; p._rgn=pref.includes(p.ingredientKey); });
  list.sort((a,b)=>(b._rgn-a._rgn)||(b._match-a._match)||(b.views-a.views));
  const cards=list.length?groupFam(list).map(g=>famGroupHtml(g,{selectable:true})).join(""):`<p class="empty">—</p>`;
  return `<div class="head-row"><h1>${t("rec_title")}</h1><button class="linkbtn" onclick="editProfile()">${t("edit")}</button></div>
    <p class="lede">${t("rec_sub")} ${t("c_"+c)} · ${t("s_"+state.profile.skin)}${reg!=="other"?` · 🌏 ${t("region_tip")} ${t("r_"+reg)}`:""}</p>${cards}${footer()}`;
}

function screenSearch(){
  const q=state.search.trim().toLowerCase();
  let list=PRODUCTS.slice();
  if(q) list=list.filter(p=>p.ko.toLowerCase().includes(q)||p.rom.toLowerCase().includes(q)||loc(p.ingredient).toLowerCase().includes(q));
  if(state.sort==="popular") list.sort((a,b)=>b.views-a.views);
  else if(state.sort==="price") list.sort((a,b)=>a.price[0]-b.price[0]);
  else if(state.sort==="name") list.sort((a,b)=>a.rom.localeCompare(b.rom));
  const showRank=state.sort==="popular";
  const cards=list.length
    ?(q?list.map((p,i)=>productCard(p,{rank:showRank?i+1:null,viewMeta:true,selectable:true})).join("")
       :groupFam(list).map(g=>famGroupHtml(g,{viewMeta:true,selectable:true})).join(""))
    :`<p class="empty">—</p>`;
  return `<h1>${t("tab_search")}</h1>
    <div class="search"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>

    <div class="sortrow"><label for="sortSel">${t("sort_label")}</label>
      <select id="sortSel" onchange="onSort(this.value)">
        <option value="popular" ${state.sort==="popular"?"selected":""}>${t("sort_popular")}</option>

        <option value="name" ${state.sort==="name"?"selected":""}>${t("sort_name")}</option>
      </select><span class="s" style="margin-left:auto">${list.length} ${t("results_count")}</span></div>
    ${cards}${footer()}`;
}

    </table>`;
  }
  const altSection=items.filter(isMed).map(m=>altBlock(m)).join("");
  return `<h1>${t("cmp_title")}</h1><p class="lede">${items.length} ${t("results_count")}</p>${toggle}${body}
    <div class="note info">${t("cmp_tip")}</div>${altSection}
    <button class="btn ghost" style="margin-top:16px" onclick="selectTab('pharmacy')">${t("find_ph")}</button>`;
}

function screenPharmacy(){
  return `<h1>${t("ph_title")}</h1><p class="lede">${t("ph_sub")}</p>
    <div class="toggle phfilter" role="group">
      <button data-f="all" aria-pressed="${state.phFilter!=='beauty'}" onclick="setPhFilter('all')">${t("ph_all")}</button>
      <button data-f="beauty" aria-pressed="${state.phFilter==='beauty'}" onclick="setPhFilter('beauty')">✓ ${t("ph_beauty")}</button>
    </div>
    <div class="map" id="kkmap">${t("ph_loading")}</div>
    <div class="legend"><span><i style="background:#E11D48"></i>${t("ph_me")}</span><span><i style="background:#1F7A5A"></i>${t("ph_beauty")}</span><span><i style="background:#6B7280"></i>${t("ph_other")}</span></div>
    <button class="btn ghost locbtn" id="relocateBtn" onclick="relocatePharmacy()">${t("ph_relocate")}</button>
    <div id="phlist"></div>
    <div class="note info">${t("ph_note")}</div>${footer()}`;
}
function footer(){ return `<p class="foot">${t("foot")}</p>`; }

/* ---------- distance + pharmacy ---------- */
function distKm(aLat,aLng,bLat,bLng){
  const R=6371,toR=x=>x*Math.PI/180;
  const dLat=toR(bLat-aLat),dLng=toR(bLng-aLng);
  const s=Math.sin(dLat/2)**2+Math.cos(toR(aLat))*Math.cos(toR(bLat))*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(s),Math.sqrt(1-s));
}
function fmtDist(km){ return km<1?Math.round(km*1000)+" m":km.toFixed(1)+" km"; }
const naverDir=p=>`https://map.naver.com/p/search/${encodeURIComponent(p.nmKo)}`;
const googleDir=p=>`https://www.google.com/maps/dir/?api=1&destination=${p.lat},${p.lng}`;
const kakaoDir=p=>`https://map.kakao.com/link/to/${encodeURIComponent(p.nmKo)},${p.lat},${p.lng}`;
function renderPhList(list){
  const el=$("#phlist"); if(!el) return;
  if(!list.length){ el.innerHTML=`<p class="empty">${t("ph_empty")}</p>`; return; }
  el.innerHTML=list.map((p,i)=>`<div class="ph" onclick="focusPharmacy(${i})"><div class="top">
      <span class="nm">${p.nmKo}${p.nmEn?` <span class="prom">${p.nmEn}</span>`:""}</span>
      ${p.verified?`<span class="tag">✓ ${t("ph_verified")}</span>`:""}</div>
    <div class="sub"><span>◉ ${fmtDist(p._d)}</span>${p.area?`<span>${p.area}</span>`:""}</div>
    ${p.lines?`<div class="lines">${p.lines}</div>`:""}
    ${p.phone?`<div class="phmeta">☎ <a href="tel:${p.phone}" onclick="event.stopPropagation()">${p.phone}</a></div>`:""}
    <div class="dir" onclick="event.stopPropagation()"><span class="dirlbl">${t("dir_label")}</span>
      <a href="${naverDir(p)}" target="_blank" rel="noopener nofollow">Naver</a>
      <a href="${googleDir(p)}" target="_blank" rel="noopener nofollow">Google</a>
      <a href="${kakaoDir(p)}" target="_blank" rel="noopener nofollow">Kakao</a>
      ${p.place_url?`<a href="${p.place_url}" target="_blank" rel="noopener nofollow">${t("ph_details")} ↗</a>`:""}</div>
  </div>`).join("");
}
let naverPromise=null;
window.navermap_authFailure=function(){ const m=$("#kkmap"); if(m) m.style.display="none"; console.warn("[K-Pharmacy] Naver Maps auth failed — check NAVER_MAP_KEY and the registered Web service URL (host only, no path/port)."); };
function ensureNaver(){
  if(naverPromise) return naverPromise;
  naverPromise=new Promise((res,rej)=>{
    if(window.naver&&window.naver.maps){ res(); return; }
    if(!NAVER_MAP_KEY||NAVER_MAP_KEY==="REPLACE_WITH_YOUR_NAVER_MAP_CLIENT_ID"){ rej("no-key"); return; }
    const s=document.createElement("script");
    s.src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId="+NAVER_MAP_KEY; // older keys: use ncpClientId=
    s.onload=()=>{ (window.naver&&window.naver.maps)?res():rej("load-failed"); };
    s.onerror=()=>rej("load-failed");
    document.head.appendChild(s);
  });
  return naverPromise;
}
let phMapObj=null, phMarkers=[], phInfoWin=null, phCurrentList=[];
function phInfoHtml(p){
  const dirA=(href,label)=>`<a href="${href}" target="_blank" rel="noopener nofollow" style="font-size:12px;text-decoration:none;color:#155C43;background:#EAF4EF;border:1px solid #CFE3D9;border-radius:999px;padding:4px 10px;">${label}</a>`;
  return `<div style="padding:10px 12px;max-width:240px;background:#fff;border:1px solid #D8DAD2;border-radius:10px;box-shadow:0 6px 18px rgba(0,0,0,.14);font-family:sans-serif;">
    <div style="font-weight:600;font-size:13px;color:#1A1F1C;">${p.verified?"✓ ":""}${p.nmKo}</div>
    <div style="color:#5C635E;font-size:12px;margin-top:2px;">◉ ${fmtDist(p._d)}${p.area?" · "+p.area:""}</div>
    ${p.lines?`<div style="color:#155C43;font-size:11px;margin-top:4px;">${p.lines}</div>`:""}
    ${p.phone?`<div style="color:#5C635E;font-size:12px;margin-top:4px;">☎ <a href="tel:${p.phone}" style="color:#1F7A5A;text-decoration:none;">${p.phone}</a></div>`:""}
    <div style="margin-top:8px;display:flex;gap:6px;flex-wrap:wrap;">${dirA(naverDir(p),"Naver")}${dirA(googleDir(p),"Google")}${dirA(kakaoDir(p),"Kakao")}${p.place_url?dirA(p.place_url,t("ph_details")+" ↗"):""}</div>
  </div>`;
}
function openPhInfo(i){
  const p=phCurrentList[i], mk=phMarkers[i];
  if(!p||!mk||!phInfoWin||!phMapObj) return;
  phInfoWin.setContent(phInfoHtml(p));
  phInfoWin.open(phMapObj,mk);
}
function focusPharmacy(i){
  const p=phCurrentList[i]; if(!p) return;
  if(phMapObj&&phMarkers[i]){
    phMapObj.setCenter(new naver.maps.LatLng(p.lat,p.lng));
    if(phMapObj.getZoom()<15) phMapObj.setZoom(15);
    openPhInfo(i);
  }
  const el=$("#kkmap"); if(el) el.scrollIntoView({behavior:"smooth",block:"center"});
}
function drawMap(lat,lng,list){
  const el=$("#kkmap"); if(!el) return;
  el.textContent=""; el.style.display="block";
  const map=new naver.maps.Map(el,{center:new naver.maps.LatLng(lat,lng),zoom:14});
  phMapObj=map; phMarkers=[];
  // my location — RED dot
  new naver.maps.Marker({position:new naver.maps.LatLng(lat,lng),map,zIndex:1000,
    icon:{content:'<div style="width:16px;height:16px;background:#E11D48;border:3px solid #fff;border-radius:50%;box-shadow:0 0 0 1px #E11D48;"></div>',anchor:new naver.maps.Point(8,8)}});
  phInfoWin=new naver.maps.InfoWindow({borderWidth:0,backgroundColor:"transparent",disableAnchor:true,pixelOffset:new naver.maps.Point(0,-6)});
  list.forEach((p,i)=>{
    const col=p.verified?"#1F7A5A":"#6B7280"; // beauty = green, other = gray
    const mk=new naver.maps.Marker({position:new naver.maps.LatLng(p.lat,p.lng),map,title:p.nmKo,zIndex:p.verified?500:100,
      icon:{content:`<div style="width:14px;height:14px;background:${col};border:2.5px solid #fff;border-radius:50%;box-shadow:0 1px 3px rgba(0,0,0,.35);"></div>`,anchor:new naver.maps.Point(7,7)}});
    phMarkers[i]=mk;
    naver.maps.Event.addListener(mk,"click",()=>openPhInfo(i));
  });
  naver.maps.Event.addListener(map,"click",()=>phInfoWin&&phInfoWin.close());
}
/* Live pharmacy data via Kakao category search (PM9 = pharmacy). Headless:
   loads only the 'services' library, no Kakao map shown. */
let kakaoPromise=null;
function ensureKakaoServices(){
  if(kakaoPromise) return kakaoPromise;
  kakaoPromise=new Promise((res,rej)=>{
    if(window.kakao&&window.kakao.maps&&window.kakao.maps.services){ res(); return; }
    if(!KAKAO_JS_KEY||KAKAO_JS_KEY==="REPLACE_WITH_YOUR_KAKAO_JS_KEY"){ rej("no-key"); return; }
    const s=document.createElement("script");
    s.src="https://dapi.kakao.com/v2/maps/sdk.js?autoload=false&libraries=services&appkey="+KAKAO_JS_KEY;
    s.onload=()=>window.kakao.maps.load(()=>res());
    s.onerror=()=>rej("load-failed");
    document.head.appendChild(s);
  });
  return kakaoPromise;
}
const isBeautyName=n=>{
  if(!n) return false;
  const s=n.toLowerCase();
  return BEAUTY_NAMES.some(k=>n.indexOf(k)>=0) || BEAUTY_TOKENS.some(t=>s.indexOf(t)>=0);
};
function searchPharmacies(lat,lng){
  return new Promise((res,rej)=>{
    ensureKakaoServices().then(()=>{
      new kakao.maps.services.Places().categorySearch("PM9",(data,status)=>{
        if(status!==kakao.maps.services.Status.OK){ rej("no-result"); return; }
        const list=data.map(d=>({
          nmKo:d.place_name, nmEn:"", lat:+d.y, lng:+d.x,
          area:d.road_address_name||d.address_name||"",
          _d:d.distance?(+d.distance)/1000:distKm(lat,lng,+d.y,+d.x),
          verified:isBeautyName(d.place_name), place_url:d.place_url, phone:d.phone||""
        })).sort((a,b)=>(b.verified-a.verified)||(a._d-b._d));
        res(list);
      },{location:new kakao.maps.LatLng(lat,lng),radius:20000,sort:kakao.maps.services.SortBy.DISTANCE,size:15});
    }).catch(rej);
  });
}
function paintPharmacy(){
  const c=state._coords; if(!c) return;
  const curated=()=>FALLBACK_PH.map(p=>({...p,_d:distKm(c.lat,c.lng,p.lat,p.lng)}));
  let list;
  if(state.phFilter==="beauty"){
    const seen=new Set(); list=[];
    [...(state._livePh||[]).filter(p=>p.verified),...curated()].forEach(p=>{
      const k=p.nmKo.replace(/\s/g,""); if(!seen.has(k)){ seen.add(k); list.push(p); }
    });
    list.sort((a,b)=>a._d-b._d);
  } else {
    list=(state._livePh&&state._livePh.length)?state._livePh:curated().sort((a,b)=>a._d-b._d);
  }
  phCurrentList=list;
  renderPhList(list);
  ensureNaver().then(()=>drawMap(c.lat,c.lng,list)).catch(err=>{
    if(err==="no-key") console.warn("[K-Pharmacy] Set NAVER_MAP_KEY + register your domain to show the map.");
    const m=$("#kkmap"); if(m) m.style.display="none";
  });
}
function setPhFilter(f){
  state.phFilter=f;
  document.querySelectorAll(".phfilter button").forEach(b=>b.setAttribute("aria-pressed", String(b.dataset.f===f)));
  paintPharmacy();
}
function initPharmacy(){
  const run=(lat,lng)=>{
    state._coords={lat,lng};
    if(KAKAO_JS_KEY&&KAKAO_JS_KEY!=="REPLACE_WITH_YOUR_KAKAO_JS_KEY")
      searchPharmacies(lat,lng).then(list=>{ state._livePh=list; paintPharmacy(); }).catch(()=>{ state._livePh=null; paintPharmacy(); });
    else { state._livePh=null; paintPharmacy(); }
  };
  const def={lat:37.5636,lng:126.9869}; // Myeongdong fallback
  if(state._coords) run(state._coords.lat,state._coords.lng);
  else if(navigator.geolocation)
    navigator.geolocation.getCurrentPosition(p=>run(p.coords.latitude,p.coords.longitude),()=>run(def.lat,def.lng),{enableHighAccuracy:true,timeout:10000,maximumAge:0});
  else run(def.lat,def.lng);
}
function relocatePharmacy(){ state._coords=null; state._livePh=null; initPharmacy(); }

/* ---------- render ---------- */
function render(){
  $("#brandName").textContent=t("brand");
  $("#langCode").textContent=state.lang;
  $("#back").classList.toggle("show", state.screen==="detail"||state.screen==="compare");
  const map={foryou:screenForYou,search:screenSearch,pharmacy:screenPharmacy,detail:screenDetail,compare:screenCompare};
  app().innerHTML=(map[state.screen]||screenForYou)();

  const tabs=[
    {id:"foryou",icon:'<path d="M12 3l2.5 5.5L20 9l-4 4 1 6-5-3-5 3 1-6-4-4 5.5-.5z"/>'},
    {id:"search",icon:'<circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/>'},
    {id:"pharmacy",icon:'<path d="M12 21s-6-4.5-6-10a6 6 0 1112 0c0 5.5-6 10-6 10z"/><circle cx="12" cy="11" r="2.2"/>'}
  ];
  $("#tabbar").innerHTML=tabs.map(tb=>`<button aria-current="${state.tab===tb.id}" onclick="selectTab('${tb.id}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round">${tb.icon}</svg>${t("tab_"+tb.id)}</button>`).join("");

  const bar=$("#cmpbar");
  bar.classList.toggle("show", state.compare.length>0 && state.screen!=="compare");
  $("#cmpcnt").textContent=state.compare.length;
  $("#cmplabel").textContent=t("selected");
  $("#cmpgo").textContent=t("compare");

  if(state.screen==="pharmacy") initPharmacy();
  if(state.screen==="search" && state._focusSearch){ const s=$("#searchBox"); if(s){ s.focus(); s.setSelectionRange(s.value.length,s.value.length);} state._focusSearch=false; }
}

/* ---------- events ---------- */
function pickConcern(k){ state.profile.concern=k; render(); }
function pickRegion(k){ state.profile.region=k; render(); }
function pickSkin(k){ state.profile.skin=k; render(); }
function pickPreg(v){ state.profile.preg=v; render(); }
function finishOnboarding(){ state.profileSet=true; state.screen="foryou"; state.tab="foryou"; render(); window.scrollTo(0,0); }
function editProfile(){ state.profileSet=false; render(); window.scrollTo(0,0); }
function onSearch(v){ state.search=v; state._focusSearch=true; render(); }
function onSort(v){ state.sort=v; render(); }
function openDetail(id){ const p=findP(id); if(p) p.views++; state.detailId=id; go("detail"); }
function setCmpView(v){ state.cmpView=v; render(); }
function toggleCompare(id){
  const i=state.compare.indexOf(id);
  if(i>=0) state.compare.splice(i,1);
  else { if(state.compare.length>=MAX_CMP) state.compare.shift(); state.compare.push(id); }
  render();
}
function buildLangMenu(){ $("#langMenu").innerHTML=LANGS.map(l=>`<button role="menuitem" aria-current="${state.lang===l.code}" onclick="setLang('${l.code}')">${l.name}</button>`).join(""); }
function setLang(code){ state.lang=code; document.documentElement.lang={EN:"en",JA:"ja",ZH:"zh-Hans",ZT:"zh-Hant",TH:"th",VI:"vi",ID:"id"}[code]||"en"; $("#langMenu").classList.remove("open"); buildLangMenu(); render(); }
$("#langBtn").addEventListener("click",e=>{ e.stopPropagation(); $("#langMenu").classList.toggle("open"); });
document.addEventListener("click",()=>$("#langMenu").classList.remove("open"));
$("#back").addEventListener("click",back);
$("#cmpgo").addEventListener("click",()=>go("compare"));
$("#cmpclear").addEventListener("click",()=>{ state.compare=[]; render(); });

buildLangMenu();
render();
</script>
